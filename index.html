<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Knife Hit Pro HD</title>
    <style>
        body { margin: 0; background: #1a1a2e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: radial-gradient(#2c3e50, #000); border-radius: 15px; touch-action: none; }
        #ui { position: absolute; top: 5%; color: #fff; font-family: Arial; font-size: 80px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">0</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 360; canvas.height = 600;

    const knifeImg = new Image();
    const targetImg = new Image();

    // الرابط المباشر الذي استخرجته من ImgBB
    knifeImg.src = 'https://i.ibb.co/Rpt8MpXp/av0z1rcn4.webp';
    
    // رابط الهدف الخشبي
    targetImg.src = 'https://raw.githubusercontent.com/Ademking/Knife-Hit-Clone/master/assets/target.png';

    let score = 0, angle = 0, knives = [], currentKnifeY = 500, isShooting = false;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // رسم الهدف
        ctx.save();
        ctx.translate(180, 200);
        ctx.rotate(angle);
        if (targetImg.complete) {
            ctx.drawImage(targetImg, -80, -80, 160, 160);
        }

        // رسم السكاكين المغروزة
        knives.forEach(kAngle => {
            ctx.save();
            ctx.rotate(kAngle);
            if (knifeImg.complete) {
                ctx.drawImage(knifeImg, -20, 70, 40, 110);
            }
            ctx.restore();
        });
        ctx.restore();

        // رسم سكين اللاعب
        if (knifeImg.complete) {
            ctx.drawImage(knifeImg, 160, currentKnifeY, 40, 110);
        }

        if (isShooting) {
            currentKnifeY -= 35;
            if (currentKnifeY <= 260) {
                knives.push(-angle);
                score++;
                document.getElementById('ui').innerText = score;
                isShooting = false;
                currentKnifeY = 500;
            }
        }

        angle += 0.03;
        requestAnimationFrame(draw);
    }

    const shoot = (e) => { 
        if (e.cancelable) e.preventDefault(); 
        if (!isShooting) isShooting = true; 
    };
    
    canvas.addEventListener('mousedown', shoot);
    canvas.addEventListener('touchstart', shoot, {passive: false});

    draw();
</script>
</body>
</html>
