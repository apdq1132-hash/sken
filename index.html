<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Knife Hit HD Fix</title>
    <style>
        body { margin: 0; background-color: #1a1a2e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { 
            background: radial-gradient(#2c3e50, #000); 
            border-radius: 15px; 
            touch-action: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        #ui { position: absolute; top: 5%; color: #fff; font-family: 'Arial'; font-size: 80px; font-weight: bold; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">0</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 360;
    canvas.height = 600;

    ctx.imageSmoothingEnabled = false;

    // --- تحميل الصور ---
    const targetImg = new Image();
    targetImg.src = 'https://raw.githubusercontent.com/Ademking/Knife-Hit-Clone/master/assets/target.png'; 

    const knifeImg = new Image();
    // استخدام اسم ملفك الجديد
    knifeImg.src = 'av0z1rcn4.webp.png'; 

    let score = 0, angle = 0, knives = [], currentKnifeY = 500, isShooting = false, rotationSpeed = 0.03;
    let imagesLoaded = 0;

    // وظيفة للتأكد من تحميل الصور قبل بدء الرسم
    function imageLoaded() {
        imagesLoaded++;
        if (imagesLoaded === 2) {
            requestAnimationFrame(draw);
        }
    }

    knifeImg.onload = imageLoaded;
    targetImg.onload = imageLoaded;

    function resetGame() {
        score = 0; angle = 0; knives = []; currentKnifeY = 500; isShooting = false; rotationSpeed = 0.03;
        document.getElementById('ui').innerText = score;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. رسم الهدف
        ctx.save();
        ctx.translate(180, 200);
        ctx.rotate(angle);
        ctx.drawImage(targetImg, -80, -80, 160, 160);

        // 2. رسم السكاكين المغروزة
        knives.forEach(kAngle => {
            ctx.save();
            ctx.rotate(kAngle);
            ctx.translate(0, 70);
            ctx.rotate(Math.PI); 
            ctx.drawImage(knifeImg, -20, -60, 40, 120); 
            ctx.restore();
        });
        ctx.restore();

        // 3. رسم سكين اللاعب (ثابتة في مكانها بالأسفل)
        ctx.drawImage(knifeImg, 160, currentKnifeY, 40, 120);

        if (isShooting) {
            currentKnifeY -= 35;
            if (currentKnifeY <= 260) {
                checkCollision();
            }
        }

        angle += rotationSpeed;
        requestAnimationFrame(draw);
    }

    function checkCollision() {
        let currentAngle = (-angle) % (Math.PI * 2);
        if (currentAngle < 0) currentAngle += (Math.PI * 2);
        let hit = knives.some(k => Math.abs(currentAngle - (k % (Math.PI * 2))) < 0.4);

        if (hit) {
            alert("خسرت! النتيجة: " + score);
            resetGame();
        } else {
            knives.push(-angle);
            score++;
            document.getElementById('ui').innerText = score;
            isShooting = false;
            currentKnifeY = 500;
            rotationSpeed += 0.002;
        }
    }

    const shoot = () => { if (!isShooting) isShooting = true; };
    window.addEventListener('mousedown', shoot);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

</script>
</body>
</html>
