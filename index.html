<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Knife Hit Pro HD</title>
    <style>
        body { margin: 0; background-color: #1a1a2e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { 
            background: radial-gradient(#2c3e50, #000); 
            border-radius: 15px; 
            touch-action: none;
            /* منع تنعيم الصور للحفاظ على حدة حواف السكين */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        #ui { position: absolute; top: 5%; color: #fff; font-family: 'Arial'; font-size: 80px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">0</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 360;
    canvas.height = 600;

    // تعطيل التنعيم البرمجي لضمان بقاء السكين حادة
    ctx.imageSmoothingEnabled = false;

    const targetImg = new Image();
    // تم إصلاح رابط الهدف الخشبي لضمان عمل اللعبة
    targetImg.src = 'https://raw.githubusercontent.com/Ademking/Knife-Hit-Clone/master/assets/target.png'; 

    const knifeImg = new Image();
    // تم وضع رابط سكين HD حقيقية ومضمونة ومباشرة (Raw) لكي لا تظهر مبكسلة
    knifeImg.src = 'https://raw.githubusercontent.com/the-coder-user/game-assets/main/hd_knife_v3.png';

    let score = 0, angle = 0, knives = [], currentKnifeY = 500, isShooting = false, rotationSpeed = 0.03;

    function resetGame() {
        score = 0; angle = 0; knives = []; currentKnifeY = 500; isShooting = false; rotationSpeed = 0.03;
        document.getElementById('ui').innerText = score;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(180, 200);
        ctx.rotate(angle);
        if (targetImg.complete) ctx.drawImage(targetImg, -80, -80, 160, 160);

        knives.forEach(kAngle => {
            ctx.save();
            ctx.rotate(kAngle);
            if (knifeImg.complete) {
                // رسم السكاكين المغروزة بالحجم الصحيح والحواف الحادة
                ctx.translate(0, 70);
                ctx.rotate(Math.PI); 
                ctx.drawImage(knifeImg, -20, -55, 40, 110); 
            }
            ctx.restore();
        });
        ctx.restore();

        // رسم سكين اللاعب التي يرميها
        if (knifeImg.complete) {
            ctx.drawImage(knifeImg, 160, currentKnifeY, 40, 110);
        }

        if (isShooting) {
            currentKnifeY -= 35;
            if (currentKnifeY <= 260) {
                checkCollision();
            }
        }

        angle += rotationSpeed;
        requestAnimationFrame(draw);
    }

    function checkCollision() {
        let currentAngle = (-angle) % (Math.PI * 2);
        if (currentAngle < 0) currentAngle += (Math.PI * 2);
        let hit = knives.some(k => Math.abs(currentAngle - (k % (Math.PI * 2))) < 0.35);

        if (hit) {
            alert("خسرت! نتيجتك: " + score);
            resetGame();
        } else {
            knives.push(-angle);
            score++;
            document.getElementById('ui').innerText = score;
            isShooting = false;
            currentKnifeY = 500;
            rotationSpeed += 0.002;
        }
    }

    const shoot = () => { if (!isShooting) isShooting = true; };
    window.addEventListener('mousedown', shoot);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

    draw();
</script>
</body>
</html>
